version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies...
      - pip install -r requirements.txt || echo "No requirements file"

  build:
    commands:
      - echo Build started
      - python main.py || echo "No main.py file"

  post_build:
    commands:
      - echo Build completed

artifacts:
  files:
    - '**/*'
